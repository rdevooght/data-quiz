<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title id="page-title">Quiz</title>

        <!-- Bootstrap 5 -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css"
        />

        <!-- Marked.js (Markdown → HTML) -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>

        <!-- Alpine.js -->
        <script
            defer
            src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.14.1/cdn.min.js"
        ></script>

        <!-- Quiz config (must come before Alpine initialises) -->
        <script src="config.js"></script>
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <main
            class="quiz-card card border-0"
            x-data="quizApp()"
            x-init="init()"
            aria-label="Quiz"
        >
            <div
                class="visually-hidden"
                role="status"
                aria-live="polite"
                x-text="liveMessage"
            ></div>
            <!-- ── Header ─────────────────────────────────── -->
            <div class="quiz-title">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <h4 class="mb-0 fw-bold" x-text="config.title"></h4>
                        <small
                            class="opacity-75"
                            x-show="screen === 'quiz'"
                            x-cloak
                        >
                            <span x-text="name"></span>
                        </small>
                    </div>
                    <button
                        type="button"
                        class="btn btn-sm btn-outline-light"
                        x-show="screen !== 'name'"
                        x-cloak
                        @click="restart()"
                        title="Recommencer le quiz"
                    >
                        ↺ Recommencer
                    </button>
                </div>

                <!-- Progress bar (quiz screen only) -->
                <div class="mt-3" x-show="screen === 'quiz'" x-cloak>
                    <div class="d-flex justify-content-between mb-1">
                        <small class="opacity-75">
                            Question <span x-text="currentIndex + 1"></span> sur
                            <span x-text="config.questions.length"></span>
                        </small>
                        <small
                            class="opacity-75"
                            x-text="Math.round(progress) + '%'"
                        ></small>
                    </div>
                    <div class="progress bg-white bg-opacity-25">
                        <div
                            class="progress-bar bg-white"
                            role="progressbar"
                            :aria-valuenow="Math.round(progress)"
                            aria-valuemin="0"
                            aria-valuemax="100"
                            aria-label="Progression du quiz"
                            :style="'width:' + progress + '%'"
                        ></div>
                    </div>
                </div>

                <!-- Navigation -->
                <div
                    x-show="screen === 'quiz'"
                    class="d-flex justify-content-between align-items-center mt-3"
                >
                    <button
                        type="button"
                        class="btn btn-sm btn-outline-light"
                        @click="goPrev()"
                        :disabled="!canGoPrev"
                    >
                        ← Question précédente
                    </button>
                    <button
                        type="button"
                        class="btn btn-sm btn-outline-light"
                        @click="goNext()"
                        :disabled="!canGoNext"
                    >
                        Question suivante →
                    </button>
                </div>
            </div>

            <!-- ── Name Screen ─────────────────────────────── -->
            <div class="card-body" x-show="screen === 'name'">
                <h5 class="mb-1">Bienvenue !</h5>
                <p class="text-muted mb-4">
                    Entrez votre nom pour commencer le quiz.
                </p>

                <div class="mb-3">
                    <label class="form-label fw-semibold" for="name-input"
                        >Votre nom</label
                    >
                    <input
                        id="name-input"
                        class="form-control answer-input"
                        type="text"
                        placeholder="ex. Alice"
                        x-model="name"
                        @keydown.enter="startQuiz()"
                        autocomplete="name"
                        autofocus
                    />
                </div>

                <button
                    type="button"
                    class="btn btn-primary w-100 fw-semibold"
                    :disabled="!name.trim()"
                    @click="startQuiz()"
                >
                    Commencer le quiz →
                </button>
            </div>

            <!-- ── Quiz Screen ─────────────────────────────── -->
            <div class="card-body" x-show="screen === 'quiz'" x-cloak>
                <!-- Question -->

                <p
                    x-show="currentQuestion.intro"
                    x-html="marked.parse(currentQuestion.intro)"
                ></p>

                <p
                    class="text-muted small mb-1 text-uppercase fw-semibold tracking-wide"
                >
                    Question <span x-text="currentIndex + 1"></span>
                </p>
                <h5
                    class="mb-4"
                    x-html="marked.parse(currentQuestion.question)"
                ></h5>

                <!-- Answer input -->
                <div class="mb-3" :class="{ shake: shaking }">
                    <label class="form-label fw-semibold" for="answer-input"
                        >Votre réponse</label
                    >
                    <div x-show="currentAnswerType !== 'choice'">
                        <div class="input-group">
                            <input
                                id="answer-input"
                                class="form-control answer-input"
                                :type="currentAnswerType"
                                :placeholder="answerTypeRemark"
                                x-model="answer"
                                @keydown.enter="submitAnswer()"
                                x-ref="answerInput"
                                :inputmode="currentAnswerType === 'number' ? 'numeric' : 'text'"
                                :aria-invalid="wrongAnswer ? 'true' : 'false'"
                                aria-describedby="answer-type-remark wrong-answer-feedback"
                                autocomplete="off"
                                :disabled="isCurrentAnswered"
                            />
                            <button
                                type="button"
                                class="btn btn-primary px-4 fw-semibold"
                                @click="submitAnswer()"
                                :disabled="isCurrentAnswered"
                            >
                                Valider
                            </button>
                        </div>
                    </div>

                    <div x-show="currentAnswerType === 'choice'" x-cloak>
                        <div
                            class="border rounded-3 p-3 bg-white bg-opacity-10"
                            role="radiogroup"
                            :aria-invalid="wrongAnswer ? 'true' : 'false'"
                            aria-describedby="wrong-answer-feedback"
                            x-ref="choiceGroup"
                        >
                            <template
                                x-for="(choice, choiceIndex) in currentChoices"
                                :key="choiceIndex"
                            >
                                <div class="form-check mb-2">
                                    <input
                                        class="form-check-input"
                                        type="radio"
                                        name="choice-answer"
                                        :id="'choice-' + choiceIndex"
                                        :value="choice"
                                        x-model="answer"
                                        :disabled="isCurrentAnswered"
                                    />
                                    <label
                                        class="form-check-label"
                                        :for="'choice-' + choiceIndex"
                                        x-text="choice"
                                    ></label>
                                </div>
                            </template>
                        </div>
                        <button
                            type="button"
                            class="btn btn-primary px-4 fw-semibold mt-3 w-100"
                            @click="submitAnswer()"
                            :disabled="isCurrentAnswered || !answer"
                        >
                            Valider
                        </button>
                    </div>

                    <!-- Wrong answer feedback -->
                    <div
                        id="wrong-answer-feedback"
                        class="text-danger small mt-1 fw-semibold"
                        x-show="wrongAnswer"
                        x-cloak
                        role="alert"
                        x-text="wrongAnswerMessage"
                    ></div>
                </div>

                <!-- Hints (native <details>) -->
                <div class="mt-4" x-show="currentHints.length" x-cloak>
                    <template
                        x-for="(hint, hintIndex) in currentHints"
                        :key="hintIndex"
                    >
                        <details class="mb-2">
                            <summary class="btn btn-sm btn-outline-secondary">
                                <span
                                    x-text="currentHints.length > 1
                                        ? ' #' + (hintIndex + 1)
                                        : ' '"
                                ></span>
                            </summary>
                            <div
                                class="hint-box p-3 mt-2"
                                @click="handleHintClick($event)"
                            >
                                <div
                                    class="small"
                                    x-html="renderHint(hint)"
                                ></div>
                            </div>
                        </details>
                    </template>
                </div>
            </div>

            <!-- ── Done Screen ─────────────────────────────── -->
            <div
                class="card-body text-center py-5"
                x-show="screen === 'done'"
                x-cloak
            >
                <div class="star-emoji mb-3">🏆</div>
                <h4 class="fw-bold mb-2">
                    Félicitations, <span x-text="name"></span> !
                </h4>
                <p class="text-muted mb-4">
                    Vous avez répondu correctement aux
                    <strong x-text="config.questions.length"></strong> questions
                    .<br />
                    Bravo !
                </p>
                <button
                    type="button"
                    class="btn btn-primary px-5 fw-semibold"
                    @click="restart()"
                >
                    Rejouer
                </button>
            </div>

            <!-- Image modal -->
            <div
                class="image-modal"
                x-show="imageModalOpen"
                x-cloak
                role="dialog"
                aria-modal="true"
                aria-label="Agrandir l'image"
                @keydown.escape.window="closeImageModal()"
                @click.self="closeImageModal()"
            >
                <button
                    type="button"
                    class="image-modal__close"
                    @click="closeImageModal()"
                    aria-label="Fermer l'image"
                >
                    ✕
                </button>
                <img
                    class="image-modal__img"
                    :src="imageModalSrc"
                    :alt="imageModalAlt"
                />
            </div>
        </main>
        <!-- /quiz-card -->

        <script src="script.js"></script>
    </body>
</html>
