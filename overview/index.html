<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Quiz Overview</title>

        <script
            defer
            src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.14.1/cdn.min.js"
        ></script>

        <script src="../config.js"></script>
        <script type="module">
            import { minidenticonSvg } from "https://cdn.jsdelivr.net/npm/minidenticons@4.2.1/minidenticons.min.js";
        </script>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body x-data="overviewApp()" x-init="init()">
        <header>
            <div>
                <h1 x-text="config.title || 'Quiz Overview'"></h1>
                <div class="subtitle">
                    <span x-text="participants.length"></span> participant·es
                    &nbsp;·&nbsp;
                    <span x-text="config.questions.length"></span> questions
                </div>
            </div>
            <span class="pulse-dot" title="polling every 5s"></span>
        </header>

        <!-- Labels -->
        <div class="question-axis" x-show="config.questions.length">
            <span class="question-tick" :style="`left: 0`">Start</span>
            <template x-for="(q, idx) in config.questions" :key="idx">
                <span
                    class="question-tick"
                    :style="`left: ${config.questions.length === 1 ? 0 : ((idx+1) / (config.questions.length)) * 100}%`"
                    x-text="`${idx < config.questions.length - 1 ? idx + 1 : 'Finish'}`"
                ></span>
            </template>
        </div>
        <div class="divider"></div>

        <!-- Participant rows -->
        <div class="track-wrapper">
            <template x-if="participants.length === 0 && !error">
                <p class="state-msg">Waiting for participants…</p>
            </template>
            <template x-if="error">
                <p class="state-msg" x-text="error"></p>
            </template>

            <template x-for="p in participants" :key="p.person_id">
                <div class="participant-row">
                    <!-- Track -->
                    <div class="track">
                        <div class="line line-start"></div>
                        <div class="line line-finish"></div>

                        <!-- Trail -->
                        <div
                            class="trail"
                            :class="{ 'at-finish': progress(p) >= 1 }"
                            :style="`width: calc(${progress(p) * 100}% )`"
                        ></div>

                        <!-- Runner avatar -->
                        <div
                            class="runner-wrap"
                            :style="`left: ${progress(p) * 100}%`"
                        >
                            <div
                                class="runner-avatar"
                                :class="{
                'at-finish':   progress(p) >= 1,
                'not-started': progress(p) == 0
              }"
                            >
                                <minidenticon-svg
                                    :username="avatarSeed(p)"
                                    saturation="80"
                                    lightness="46"
                                ></minidenticon-svg>
                            </div>
                            <span
                                class="q-label"
                                x-text="p.question_id != null ? 'Q' + p.question_id : ''"
                            ></span>
                            <span
                                class="p-tooltip"
                                x-text="p.person_name || 'anonymous'"
                            ></span>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <footer x-text="`Mise à jour : ${lastUpdated || '—'}`"></footer>
        <script src="script.js"></script>
    </body>
</html>
